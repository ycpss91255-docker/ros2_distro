name: Main CI/CD Pipeline
run-name: ${{ github.actor }} triggered CI/CD on ${{ github.ref_name }}

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:

  call-docker-build:
    permissions:
      contents: read
    uses: ycpss91255-docker/template/.github/workflows/build-worker.yaml@v0.19.0
    with:
      image_name: osrf_ros2_humble
      build_args: |
        ROS_DISTRO=humble
        ROS_TAG=desktop-full
        UBUNTU_CODENAME=jammy

  call-release:
    needs: call-docker-build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    uses: ycpss91255-docker/template/.github/workflows/release-worker.yaml@v0.19.0
    with:
      archive_name_prefix: osrf_ros2_humble
    secrets: inherit
